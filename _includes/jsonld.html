<!-- Organization (every page) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "NGO",
  "@id": "https://arpensions.org/#organization",
  "name": "Arkansans for Retirement Transparency",
  "url": "https://arpensions.org",
  "email": "info@arpensions.org",
  "logo": {
    "@type": "ImageObject",
    "@id": "https://arpensions.org/#logo",
    "url": "https://arpensions.org/assets/images/art-logo.svg",
    "contentUrl": "https://arpensions.org/assets/images/art-logo.svg",
    "caption": "Arkansans for Retirement Transparency logo"
  },
  "description": "Grassroots Arkansas campaign advocating for pension transparency and fiduciary accountability regarding state retirement system investments in non-marketable foreign sovereign debt.",
  "areaServed": {
    "@type": "AdministrativeArea",
    "name": "Arkansas"
  },
  "knowsAbout": ["pension transparency", "public records (FOIA)", "fiduciary duty", "state pension funds", "non-marketable sovereign debt", "pension fiduciary duty", "public finance oversight"],
  "contactPoint": [{
    "@type": "ContactPoint",
    "contactType": "media inquiries",
    "email": "info@arpensions.org",
    "availableLanguage": ["en-US"]
  }]
}
</script>

{% if page.url == "/" %}
<!-- WebSite (homepage only) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "@id": "https://arpensions.org/#website",
  "url": "https://arpensions.org",
  "name": "Arkansans for Retirement Transparency",
  "inLanguage": "en-US",
  "publisher": {
    "@id": "https://arpensions.org/#organization"
  }
}
</script>
{% endif %}

{% unless page.url == "/" %}
<!-- BreadcrumbList (every page except homepage) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "https://arpensions.org/"
    }{% if page.layout == "post" %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "News",
      "item": "https://arpensions.org/news/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ page.title | escape }}"
    }{% else %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.title | escape }}"
    }{% endif %}
  ]
}
</script>
{% endunless %}

{% if page.layout == "post" %}
<!-- NewsArticle (posts only) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "NewsArticle",
  "headline": "{{ page.title | escape }}",
  "description": "{{ page.description | default: page.excerpt | strip_html | strip_newlines | escape }}",
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
  "author": {
    "@id": "https://arpensions.org/#organization"
  },
  "publisher": {
    "@id": "https://arpensions.org/#organization"
  },
  "image": "https://arpensions.org/assets/images/og-default.png",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  }
}
</script>
{% endif %}

{% if page.url == "/about/" %}
<!-- FAQPage (about page only) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Isn't this about politics?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. This is about fiduciary duty and financial risk. Arkansas law requires that pension investments be made based on pecuniary factors — financial merit. When internal staff recommend against purchases and officials celebrate the investment as a political statement, there are legitimate questions about whether the fiduciary standard was met."
      }
    },
    {
      "@type": "Question",
      "name": "What investment are we investigating?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Our investigation focuses on non-marketable foreign sovereign debt — bonds issued by a foreign government that cannot be sold on any secondary market. Pension funds that purchase these instruments are locked in until maturity. All three major credit rating agencies (Moody's, S&amp;P, and Fitch) have downgraded the issuing country's credit since 2024. See the glossary for the full financial profile."
      }
    },
    {
      "@type": "Question",
      "name": "Why does this matter for my pension?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Even though the sovereign bond allocations are a small percentage of each fund's total assets, the process concerns are significant. If investment decisions can be made through political channels — bypassing independent analysis and overriding staff recommendations — it sets a precedent that could affect larger decisions in the future."
      }
    },
    {
      "@type": "Question",
      "name": "Are you calling for a boycott?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. We are calling for the same standard that Arkansas law already requires: that investment decisions be based solely on financial merit. We are asking for a pause, an independent analysis, and transparent process — the basic requirements of prudent pension management."
      }
    },
    {
      "@type": "Question",
      "name": "Is it legal to file FOIA requests and question state investment decisions?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Absolutely. Freedom of Information Act requests are a fundamental right under Arkansas law. Asking elected officials and appointed trustees to account for their investment decisions is exactly what pension oversight laws are designed to enable."
      }
    },
    {
      "@type": "Question",
      "name": "How is this campaign funded?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Arkansans for Retirement Transparency operates on a shoestring budget through small donations. We have no institutional funding and no paid staff. This is a volunteer-driven campaign."
      }
    },
    {
      "@type": "Question",
      "name": "How can I help?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Visit the Take Action page to sign on in support, write to your pension trustees, contact your legislators, attend a board meeting, or volunteer with the campaign."
      }
    }
  ]
}
</script>
{% endif %}
