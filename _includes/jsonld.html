<!-- Organization (every page) -->
<script type="application/ld+json">
{

  "@id": "https://divestforarfuture.github.io/#organization",
  "name": "Divest for AR Future",
  "url": "https://divestforarfuture.github.io",
  "email": "divestforarfuture@proton.me",
  "logo": {
    "@type": "ImageObject",
    "@id": "https://divestforarfuture.github.io/#logo",
    "url": "https://divestforarfuture.github.io/assets/images/d4arf-logo.png",
    "contentUrl": "https://divestforarfuture.github.io/assets/images/d4arf-logo.png",
    "caption": "Divest for AR Future logo"

  "areaServed": {
    "@type": "AdministrativeArea",

{% if page.url == "/" %}
<!-- WebSite (homepage only) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "@id": "https://divestforarfuture.github.io/#website",
  "url": "https://divestforarfuture.github.io",
  "name": "Divest for AR Future",
  "inLanguage": "en-US",
  "publisher": {
    "@id": "https://divestforarfuture.github.io/#organization"
  }
}
</script>

{% unless page.url == "/" %}
<!-- BreadcrumbList (every page except homepage) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "https://divestforarfuture.github.io/"
    }{% if page.layout == "post" %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "News",
      "item": "https://divestforarfuture.github.io/news/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ page.title | escape }}"
    }{% else %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.title | escape }}"
    }{% endif %}
  ]
}
</script>
{% endunless %}

{% if page.layout == "post" %}
<!-- NewsArticle (posts only) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "NewsArticle",
  "headline": "{{ page.title | escape }}",
  "description": "{{ page.description | default: page.excerpt | strip_html | strip_newlines | escape }}",
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
  "author": {
    "@id": "https://divestforarfuture.github.io/#organization"
  },
  "publisher": {
    "@id": "https://divestforarfuture.github.io/#organization"
  },
  "image": "https://divestforarfuture.github.io/assets/images/og-default.png",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  }
}
</script>
{% endif %}

{% if page.url == "/about/" %}
<!-- FAQPage (about page only) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Isn't this about politics?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. This is about fiduciary duty and financial risk. Arkansas law requires that pension investments be made based on pecuniary factors — financial merit. When internal staff recommend against purchases and officials celebrate the investment as a political statement, there are legitimate questions about whether the fiduciary standard was met."
      }
    },
    {
      "@type": "Question",
      "name": "What are Israel Bonds?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Israel Bonds are direct loans to the Israeli government. Unlike most bonds, they cannot be sold on a secondary market before maturity, which means pension funds that buy them are locked into the investment. Two major credit rating agencies (Moody's and S&amp;P) have downgraded Israel's credit since 2024."
      }
    },
    {
      "@type": "Question",
      "name": "Why does this matter for my pension?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Even though the Israel Bonds allocations are a small percentage of each fund's total assets, the process concerns are significant. If investment decisions can be made through political channels — bypassing independent analysis and overriding staff recommendations — it sets a precedent that could affect larger decisions in the future."
      }
    },
    {
      "@type": "Question",
      "name": "Are you calling for a boycott?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. We are calling for the same standard that Arkansas law already requires: that investment decisions be based solely on financial merit. We are asking for a pause, an independent analysis, and transparent process — the basic requirements of prudent pension management."
      }
    },
    {
      "@type": "Question",
      "name": "Is it legal to file FOIA requests and question state investment decisions?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Absolutely. Freedom of Information Act requests are a fundamental right under Arkansas law. Asking elected officials and appointed trustees to account for their investment decisions is exactly what pension oversight laws are designed to enable."
      }
    },
    {
      "@type": "Question",
      "name": "How is this campaign funded?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Divest for AR Future operates on a shoestring budget through small donations. We have no institutional funding and no paid staff. This is a volunteer-driven campaign."
      }
    },
    {
      "@type": "Question",
      "name": "How can I help?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Visit the Take Action page to sign on in support, write to your pension trustees, contact your legislators, attend a board meeting, or volunteer with the campaign."
      }
    }
  ]
}
</script>
{% endif %}
