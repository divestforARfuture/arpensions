<!-- CSP: sha256 hash whitelists the anti-FOUC inline script below.
     If you change the script content, recompute with:

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-zrMEIGiETIwc1NBdGMLVkXZhI69R+jKFJooy8t54eXY=' https://actionnetwork.org https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com; img-src 'self' data:; object-src 'self';">

<!-- Anti-FOUC: set theme + color-scheme + background/color before any rendering.
     Also creates an exact-match <meta name="color-scheme"> dynamically
     (the static meta was removed — it caused a flash by telling the browser
     "use OS preference" before the script could correct it).
     Reads the current 'api-theme' key first, then falls back to the legacy
     'art-theme' key so returning visitors keep their saved preference on
     first paint after the rename. theme-toggle.js completes the migration.
     CSP hash: sha256-zrMEIGiETIwc1NBdGMLVkXZhI69R+jKFJooy8t54eXY= -->
<script>(function(){var d=document.documentElement;var t=localStorage.getItem('api-theme')||localStorage.getItem('art-theme');if(t!=='dark'&&t!=='light')t=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';d.setAttribute('data-theme',t);d.style.colorScheme=t;d.style.backgroundColor=t==='dark'?'#1C1917':'#F8F5F0';d.style.color=t==='dark'?'#F8F5F0':'#1C1917';var m=document.createElement('meta');m.name='color-scheme';m.content=t;document.head.appendChild(m)})()</script>
<!-- Critical paint: prevents flash while external CSS loads.
     Covers BOTH themes, backgrounds for all visible elements, logo swap.
     Values hardcoded — keep in sync with main.css tokens. -->
<style>
html[data-theme="dark"]{color-scheme:dark;background-color:#1C1917;color:#F8F5F0}
html[data-theme="light"]{color-scheme:light;background-color:#F8F5F0;color:#1C1917}
html[data-theme="dark"] body{background-color:#1C1917}
html[data-theme="light"] body{background-color:#F8F5F0}
html[data-theme="dark"] .site-nav{background:#242220}
html[data-theme="light"] .site-nav{background:#FFFFFF}
html[data-theme="dark"] .site-footer{background:#0E0D0C}
html[data-theme="light"] .site-footer{background:#1A3057}
html[data-theme="dark"] main{background-color:#1C1917}
html[data-theme="light"] main{background-color:#F8F5F0}
html[data-theme="dark"] .mobile-cta-bar{background:#242220}
html[data-theme="light"] .mobile-cta-bar{background:#FFFFFF}
.logo-dark{position:absolute;top:0;left:0;pointer-events:none}
[data-theme="dark"] .logo-light,[data-theme="light"] .logo-dark,:root:not([data-theme]) .logo-dark{opacity:0}
[data-theme="dark"] .logo-dark,[data-theme="light"] .logo-light{opacity:1}
html[data-theme="dark"] :where(main,footer,aside,section,article,div){background-color:transparent}
/* ADD NEW THEMED COMPONENTS IN ALL THREE LOCATIONS: base pairs above, @media dark block, and @media light block */
html[data-theme="light"] .hero{background-color:#1A3057}
html[data-theme="dark"] .hero{background-color:#1C1917}
html[data-theme="light"] .hero-band{background:#1A3057}
html[data-theme="dark"] .hero-band{background:#1C1917}

html[data-theme="dark"] .audience-cards{background:#242220}
html[data-theme="light"] .stats-bar{background:#FFFFFF;border-color:#E2E2E2}
html[data-theme="dark"] .stats-bar{background:#242220;border-color:#3A3835}
html[data-theme="light"] .page-header{background:#F8F5F0}
html[data-theme="dark"] .page-header{background:#1C1917}
html[data-theme="light"] .evidence-toc-sidebar{background:#FFFFFF}
html[data-theme="dark"] .evidence-toc-sidebar{background:#1C1917}
html[data-theme="light"] .callout{background:rgba(203,166,72,0.06)}
html[data-theme="dark"] .callout{background:rgba(203,166,72,0.10)}
html[data-theme="light"] .cta-box{background:#FFFFFF}
html[data-theme="dark"] .cta-box{background:#242220}

html[data-theme="dark"] .issue-principle{background:#242220}
html[data-theme="light"] .about-section{background:#FFFFFF}
html[data-theme="dark"] .about-section{background:#1C1917}
/* Neutralize Pico's @media (prefers-color-scheme: dark) when site theme disagrees */
@media (prefers-color-scheme: dark) {
  html[data-theme="light"] { color-scheme: light !important; background: #F8F5F0 !important; color: #1C1917 !important; }
  html[data-theme="light"] body { background: #F8F5F0 !important; }
  html[data-theme="light"] main { background: #F8F5F0 !important; }
  html[data-theme="light"] .site-nav { background: #FFFFFF !important; }
  html[data-theme="light"] .site-footer { background: #1A3057 !important; }
  html[data-theme="light"] .mobile-cta-bar { background: #FFFFFF !important; }
  html[data-theme="light"] .stats-bar { background: #FFFFFF !important; border-color: #E2E2E2 !important; }
  html[data-theme="light"] .page-header { background: #F8F5F0 !important; }
  html[data-theme="light"] .evidence-toc-sidebar { background: #FFFFFF !important; }
  html[data-theme="light"] .callout { background: rgba(203,166,72,0.06) !important; }
  html[data-theme="light"] .cta-box { background: #FFFFFF !important; }
  html[data-theme="light"] .issue-principle { background: #FFFFFF !important; }
  html[data-theme="light"] .about-section { background: #FFFFFF !important; }
}
@media (prefers-color-scheme: light) {
  html[data-theme="dark"] { color-scheme: dark !important; background: #1C1917 !important; color: #F8F5F0 !important; }
  html[data-theme="dark"] body { background: #1C1917 !important; }
  html[data-theme="dark"] main { background: #1C1917 !important; }
  html[data-theme="dark"] .site-nav { background: #242220 !important; }
  html[data-theme="dark"] .site-footer { background: #0E0D0C !important; }
  html[data-theme="dark"] .mobile-cta-bar { background: #242220 !important; }
  html[data-theme="dark"] .stats-bar { background: #242220 !important; border-color: #3A3835 !important; }
  html[data-theme="dark"] .page-header { background: #1C1917 !important; }
  html[data-theme="dark"] .evidence-toc-sidebar { background: #1C1917 !important; }
  html[data-theme="dark"] .callout { background: rgba(203,166,72,0.10) !important; }
  html[data-theme="dark"] .cta-box { background: #242220 !important; }
  html[data-theme="dark"] .issue-principle { background: #242220 !important; }
  html[data-theme="dark"] .about-section { background: #1C1917 !important; }
}
