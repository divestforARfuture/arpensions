<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- CSP: sha256 hash whitelists the anti-FOUC inline script below.
     If you change the script content, recompute with:
     node -e "const c=require('crypto');const s=`SCRIPT_CONTENT`;console.log(c.createHash('sha256').update(s,'utf8').digest('base64'))" -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-QJn9GFs7QxSHEWJ5AVU7v324ZQelrUyBbiN2lYkHm8A=' https://actionnetwork.org https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com; img-src 'self' data:; object-src 'self';">

<!-- Anti-FOUC: set theme + color-scheme + background/color before any rendering.
     Also creates an exact-match <meta name="color-scheme"> dynamically
     (the static meta was removed — it caused a flash by telling the browser
     "use OS preference" before the script could correct it).
     CSP hash: sha256-QJn9GFs7QxSHEWJ5AVU7v324ZQelrUyBbiN2lYkHm8A= -->
<script>(function(){var d=document.documentElement;var t=localStorage.getItem('art-theme');if(t!=='dark'&&t!=='light')t=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';d.setAttribute('data-theme',t);d.style.colorScheme=t;d.style.backgroundColor=t==='dark'?'#1b1b1b':'#ffffff';d.style.color=t==='dark'?'#e8e6e3':'#1b1b1b';var m=document.createElement('meta');m.name='color-scheme';m.content=t;document.head.appendChild(m)})()</script>
<!-- Critical paint: prevents flash while external CSS loads.
     Covers BOTH themes, backgrounds for all visible elements, logo swap.
     Values hardcoded — keep in sync with main.css tokens. -->
<style>
html[data-theme="dark"]{color-scheme:dark;background-color:#1b1b1b;color:#e8e6e3}
html[data-theme="light"]{color-scheme:light;background-color:#ffffff;color:#1b1b1b}
html[data-theme="dark"] body{background-color:#1b1b1b}
html[data-theme="light"] body{background-color:#ffffff}
html[data-theme="dark"] .site-nav{background:#242424}
html[data-theme="dark"] .site-footer{background:#f8f7f5}
html[data-theme="dark"] main{background-color:#1b1b1b}
html[data-theme="dark"] .mobile-cta-bar{background:#242424}
html[data-theme="light"] .site-nav{background:#ffffff}
html[data-theme="light"] main{background-color:#ffffff}
html[data-theme="light"] .mobile-cta-bar{background:#ffffff}
html[data-theme="light"] .site-footer{background:#1b1b1b}
.logo-dark{position:absolute;top:0;left:0;pointer-events:none}
[data-theme="dark"] .logo-light,[data-theme="light"] .logo-dark,:root:not([data-theme]) .logo-dark{opacity:0}
[data-theme="dark"] .logo-dark,[data-theme="light"] .logo-light{opacity:1}
html[data-theme="dark"] :where(main,footer,aside,section,article,div){background-color:transparent}
html[data-theme="light"] .hero{background:#1b1b1b}
html[data-theme="dark"] .hero{background:#f8f7f5}
html[data-theme="light"] .landing-hero{background:#f8f8f6}
html[data-theme="dark"] .landing-hero{background:#242424}
html[data-theme="light"] .pathways{background:#ffffff}
html[data-theme="dark"] .pathways{background:#1b1b1b}
html[data-theme="light"] .role-ctas{background:#f8f8f6}
html[data-theme="dark"] .role-ctas{background:#242424}
html[data-theme="light"] .stats-bar{background:transparent;border-color:#e2e2e2}
html[data-theme="dark"] .stats-bar{background:transparent;border-color:#3a3a3a}
html[data-theme="light"] .page-header{background:#ffffff}
html[data-theme="dark"] .page-header{background:#1b1b1b}
html[data-theme="light"] .evidence-toc-sidebar{background:#f8f8f6}
html[data-theme="dark"] .evidence-toc-sidebar{background:#1b1b1b}
html[data-theme="light"] .callout{background:#f8f8f6}
html[data-theme="dark"] .callout{background:#242424}
html[data-theme="light"] .cta-box{background:#f8f8f6}
html[data-theme="dark"] .cta-box{background:#242424}
html[data-theme="light"] .issue-symmetry{background:#f8f8f6}
html[data-theme="dark"] .issue-symmetry{background:#242424}
html[data-theme="light"] .about-section{background:#ffffff}
html[data-theme="dark"] .about-section{background:#1b1b1b}
/* Neutralize Pico's @media (prefers-color-scheme: dark) when site theme disagrees */
@media (prefers-color-scheme: dark) {
  html[data-theme="light"] { color-scheme: light !important; background: #ffffff !important; color: #1b1b1b !important; }
  html[data-theme="light"] body { background: #ffffff !important; }
  html[data-theme="light"] main { background: #ffffff !important; }
  html[data-theme="light"] .site-nav { background: #ffffff !important; }
  html[data-theme="light"] .site-footer { background: #1b1b1b !important; }
  html[data-theme="light"] .mobile-cta-bar { background: #ffffff !important; }
}
@media (prefers-color-scheme: light) {
  html[data-theme="dark"] { color-scheme: dark !important; background: #1b1b1b !important; color: #e8e6e3 !important; }
  html[data-theme="dark"] body { background: #1b1b1b !important; }
  html[data-theme="dark"] main { background: #1b1b1b !important; }
  html[data-theme="dark"] .site-nav { background: #242424 !important; }
  html[data-theme="dark"] .site-footer { background: #f8f7f5 !important; }
  html[data-theme="dark"] .mobile-cta-bar { background: #242424 !important; }
}
@view-transition{navigation:auto}
</style>
