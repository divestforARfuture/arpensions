<!-- CSP: sha256 hash whitelists the anti-FOUC inline script below.
     If you change the script content, recompute: printf '%s' 'SCRIPT' | openssl dgst -sha256 -binary | openssl base64 -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-tOeAuFE0YRZrVapAvr/obQ4MBGr9jluihn946xkCJ8o=' https://actionnetwork.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src https://fonts.gstatic.com; img-src 'self' data:; object-src 'self';">

<!-- Anti-FOUC: set theme before any rendering (hash: sha256-tOeAuFE0YRZrVapAvr/obQ4MBGr9jluihn946xkCJ8o=) -->
<script>(function(){var t=localStorage.getItem('d4arf-theme');if(!t)t=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);})()</script>
<!-- Critical dark-mode paint: prevents white flash while external CSS loads -->
<style>html[data-theme="dark"]{background-color:#121218;color:#E5E7EB}html[data-theme="dark"] body{background-color:#121218}html[data-theme="dark"] .site-nav{background:#15151D}</style>
