<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <header>
    {% include nav.html %}
  </header>
  <main id="main-content">
    {{ content }}
  </main>
  {% include footer.html %}
  {% unless page.url contains '/take-action/' %}
  <aside class="mobile-cta-bar" aria-label="Take action">
    <a href="{{ '/take-action/' | relative_url }}" class="btn-primary">Take Action for Your Pension</a>
  </aside>
  {% endunless %}
  <script src="{{ '/assets/js/nav.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/table-wrap.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/copy-to-clipboard.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>
  <!-- AOS (Animate On Scroll) -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <!-- Scroll animations: AOS init + animated counters -->
  <script src="{{ '/assets/js/scroll-animations.js' | relative_url }}"></script>
</body>
</html>
