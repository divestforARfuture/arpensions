<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
  <link rel="stylesheet" href="{{ '/assets/css/network.css' | relative_url }}">
</head>
<body class="network-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  {% include nav.html %}
  <main id="main-content">
    {{ content }}
  </main>
  {% include footer.html %}
  <script src="{{ '/assets/js/nav.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>
  <!-- Cytoscape.js core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.33.1/cytoscape.min.js" integrity="sha384-lXrzMjLDk3q9l0I/kjqjMcDgfFnHvWTDeWP3DmMqoeOq49/qa8drmlP3OBWN9dQ3" crossorigin="anonymous"></script>
  <!-- Layout: dagre (hierarchical) -->
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js" integrity="sha384-2IH3T69EIKYC4c+RXZifZRvaH5SRUdacJW7j6HtE5rQbvLhKKdawxq6vpIzJ7j9M" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js" integrity="sha384-u69h9ebXeSjlg6q/rb1zKTRAGu/h8deCl0409xpS/QJctMKnc4M9Fzkm01VOQdeF" crossorigin="anonymous"></script>
  <!-- Layout: fcose (force-directed) — requires layout-base + cose-base peer deps -->
  <script src="https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.min.js" crossorigin="anonymous"></script>
  <!-- Fuzzy search -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js" crossorigin="anonymous"></script>
  <!-- Network visualization -->
  <script src="{{ '/assets/js/network.js' | relative_url }}" data-graph-url="{{ '/assets/js/network-graph.json' | relative_url }}"></script>
</body>
</html>
