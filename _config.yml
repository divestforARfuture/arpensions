title: Arkansans for Pension Integrity
description: "Arkansas pension transparency campaign — public records and fiduciary scrutiny of state retirement fund investments. They're messing with your money."
url: "https://arpensions.org"
baseurl: ""
permalink: /:title/
locale: en_US

# Social / Open Graph defaults
twitter:
  card: summary_large_image
social:
  name: Arkansans for Pension Integrity

# Build settings
markdown: kramdown
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  pages:
    output: true
    permalink: /:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
    values:
      image: /assets/images/og-default.png

# Exclude from build
exclude:
  - README.md
  - CLAUDE.md
  - LICENSE
  - CNAME
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - REFRAME-INSTRUCTIONS.md
