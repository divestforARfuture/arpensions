title: Arkansans for Retirement Transparency
description: "Your Retirement. Your Right to Know."
url: "https://arpensions.org"
baseurl: ""
permalink: /:title/
locale: en_US

# Social / Open Graph defaults
twitter:
  card: summary_large_image
social:
  name: Arkansans for Retirement Transparency

# Build settings
markdown: kramdown
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  pages:
    output: true
    permalink: /:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
    values:
      image: /assets/images/og-default.png

# Exclude from build
exclude:
  - README.md
  - CLAUDE.md
  - LICENSE
  - CNAME
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
